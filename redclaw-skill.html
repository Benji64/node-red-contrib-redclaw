<script type="text/javascript">
(function () {
  RED.nodes.registerType("redclaw-skill", {
    category: "RedClaw",
    color:    "#a6e3a1",
    defaults: {
      name:      { value: "" },
      skillName: { value: "" },
      context:   { value: "" },
      tools:     { value: "" },
      mcpServer: { value: "" },
    },
    inputs:  1,
    outputs: 1,
    icon:    "font-awesome/fa-puzzle-piece",
    outputLabels: ["→ Orchestrateur"],
    label: function () {
      return this.name || (this.skillName ? `skill: ${this.skillName}` : "Skill");
    },
    labelStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
  });
})();
</script>

<script type="text/html" data-template-name="redclaw-skill">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Nom affiché</label>
    <input type="text" id="node-input-name" placeholder="domotique-lumiere" />
  </div>

  <div class="form-row">
    <label for="node-input-skillName"><i class="fa fa-puzzle-piece"></i> Nom du skill</label>
    <input type="text" id="node-input-skillName"
      placeholder="domotique-lumiere" style="font-weight:600;" />
    <div style="font-size:0.78em;color:#888;margin-top:2px;">
      Identifiant unique du skill — utilisé par l'orchestrateur.
    </div>
  </div>

  <div class="form-row">
    <label for="node-input-context"><i class="fa fa-align-left"></i> Contexte</label>
    <textarea id="node-input-context" rows="5"
      style="width:100%;font-family:monospace;font-size:11px;
             border-radius:4px;border:1px solid #ccc;padding:6px;
             resize:vertical;box-sizing:border-box;"
      placeholder="Description et règles pour le LLM.&#10;Ex: Contrôle les lumières Tuya.&#10;Utilise turn_on avec { device: 'salon' }.&#10;Pour éteindre : turn_off avec le même paramètre."></textarea>
    <div style="font-size:0.78em;color:#888;margin-top:2px;">
      Texte libre — injecté dans le system prompt de l'orchestrateur.
      Décris le skill, les paramètres attendus, des exemples.
    </div>
  </div>

  <div class="form-row">
    <label for="node-input-tools"><i class="fa fa-wrench"></i> Tools</label>
    <input type="text" id="node-input-tools"
      placeholder="turn_on, turn_off, set_brightness"
      style="font-family:monospace;" />
    <div style="font-size:0.78em;color:#888;margin-top:2px;">
      Noms des tools MCP séparés par des virgules.
      Doivent correspondre aux sorties du MCP Router.
    </div>
  </div>

  <div class="form-row">
    <label for="node-input-mcpServer"><i class="fa fa-plug"></i> Serveur MCP</label>
    <input type="text" id="node-input-mcpServer"
      placeholder="http://localhost:7778  (optionnel)"
      style="color:#89dceb;" />
    <div style="font-size:0.78em;color:#888;margin-top:2px;">
      Laisser vide si les tools sont des nœuds Node-RED internes.
    </div>
  </div>

  <div style="font-size:0.78em;color:#555;background:#e8f8e8;
              padding:8px;border-radius:5px;border:1px solid #a6e3a1;
              line-height:1.7;margin-top:6px;">
    <b>Principe :</b> 1 nœud = 1 skill = 1 entrée.<br/>
    Pour plusieurs skills, place plusieurs nœuds en parallèle :<br/>
    <code>[source A] ──► [skill: domotique] ──┐</code><br/>
    <code>[source B] ──► [skill: météo]     ──┼──► [Orchestrateur]</code><br/>
    <code>[source C] ──► [skill: database]  ──┘</code>
  </div>
</script>

<script type="text/html" data-help-name="redclaw-skill">
  <p><b>RedClaw — Skill</b><br/>
  1 entrée / 1 sortie. Un nœud par skill.<br/>
  Enrichit <code>msg.redclaw.skill</code> et transmet à l'Orchestrateur.</p>

  <h3>Câblage pour plusieurs skills</h3>
  <pre>
[MQTT]  ──► [skill: domotique] ──┐
[HTTP]  ──► [skill: météo]     ──┼──► [Orchestrateur]
[inject]──► [skill: database]  ──┘
  </pre>

  <h3>Champs</h3>
  <dl class="message-properties">
    <dt>Nom du skill</dt><dd>Identifiant. Ex : <code>domotique-lumiere</code></dd>
    <dt>Contexte</dt><dd>Description + règles + exemples pour le LLM.</dd>
    <dt>Tools</dt><dd>Noms des tools MCP séparés par des virgules.</dd>
    <dt>Serveur MCP</dt><dd>URL optionnelle (vide = tools Node-RED internes).</dd>
  </dl>

  <h3>msg produit en sortie</h3>
  <dl class="message-properties">
    <dt>redclaw.userMessage <span class="property-type">string</span></dt>
    <dd>La demande (depuis msg.payload).</dd>
    <dt>redclaw.skill <span class="property-type">object</span></dt>
    <dd>{ name, context, tools, mcpServer }</dd>
    <dt>sessionId <span class="property-type">string</span></dt>
    <dd>ID de session pour la mémoire. Auto-généré si absent.</dd>
  </dl>
</script>
