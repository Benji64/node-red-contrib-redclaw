<script type="text/javascript">
(function () {
  const PRESETS = {
    ollama:    { url: "http://localhost:11434", model: "gemma3:4b",           ph: "gemma3:4b · mistral:7b · llama3.2:3b" },
    lmstudio:  { url: "http://localhost:1234",  model: "local-model",         ph: "modèle chargé dans LM Studio" },
    localai:   { url: "http://localhost:8080",  model: "gpt-3.5-turbo",       ph: "modèle LocalAI" },
    jan:       { url: "http://localhost:1337",  model: "mistral-ins-7b-q4",   ph: "modèle Jan" },
    openai:    { url: "https://api.openai.com", model: "gpt-4o-mini",         ph: "gpt-4o · gpt-4o-mini · gpt-3.5-turbo" },
    anthropic: { url: "https://api.anthropic.com", model: "claude-haiku-4-5-20251001", ph: "claude-opus-4-6 · claude-sonnet-4-6" },
    mistral:   { url: "https://api.mistral.ai", model: "mistral-small-latest", ph: "mistral-small-latest · mistral-large" },
    rest:      { url: "http://localhost:8000",  model: "",                    ph: "nom du modèle (optionnel)" },
  };

  RED.nodes.registerType("llm-config", {
    category: "config",
    defaults: {
      name:           { value: "" },
      llmType:        { value: "ollama" },
      baseUrl:        { value: "http://localhost:11434" },
      model:          { value: "gemma3:4b" },
      timeout:        { value: 60000 },
      restPath:       { value: "/chat" },
      restResultPath: { value: "response" },
      restBodyTpl:    { value: "" },
    },
    credentials: { apiKey: { type: "password" } },
    label: function () {
      const t = { ollama:"Ollama", openai:"OpenAI", anthropic:"Anthropic", mistral:"Mistral", lmstudio:"LM Studio", localai:"LocalAI", jan:"Jan", rest:"REST" };
      return this.name || `${t[this.llmType]||this.llmType} · ${this.model}`;
    },

    oneditprepare: function () {
      function update() {
        const t  = $("#node-config-input-llmType").val();
        const p  = PRESETS[t] || PRESETS.ollama;
        const needKey = ["openai","anthropic","mistral"].includes(t);
        const isRest  = t === "rest";
        const isOllama = t === "ollama";
        if (!$("#node-config-input-baseUrl").val()) $("#node-config-input-baseUrl").val(p.url);
        if (!$("#node-config-input-model").val() && p.model) $("#node-config-input-model").val(p.model);
        $("#node-config-input-model").attr("placeholder", p.ph);
        $(".rc-row-key").toggle(needKey || isRest);
        $(".rc-row-rest").toggle(isRest);
        $(".rc-hint-ollama").toggle(isOllama);
        $(".rc-hint-openai").toggle(["openai","lmstudio","localai","jan","mistral"].includes(t));
      }
      $("#node-config-input-llmType").on("change", update);
      update();

      $("#rc-llm-test").on("click", async function () {
        const btn = $(this);
        btn.text("Test…").prop("disabled", true);
        try {
          const t = $("#node-config-input-llmType").val();
          const url = $("#node-config-input-baseUrl").val();
          if (t === "ollama") {
            const r = await fetch(`${url}/api/tags`);
            const d = await r.json();
            btn.text(`✓ ${(d.models||[]).length} modèle(s)`).css("color","green");
          } else if (["openai","lmstudio","localai","jan","mistral"].includes(t)) {
            const key = $("#node-config-input-apiKey").val();
            const h = key ? { Authorization: `Bearer ${key}` } : {};
            const r = await fetch(`${url}/v1/models`, { headers: h });
            btn.text(r.ok ? "✓ Connecté" : `✗ HTTP ${r.status}`).css("color", r.ok ? "green" : "red");
          } else { btn.text("Test manuel requis").css("color","orange"); }
        } catch (e) { btn.text(`✗ ${e.message.slice(0,30)}`).css("color","red"); }
        btn.prop("disabled", false);
        setTimeout(() => btn.text("Tester").css("color",""), 3500);
      });
    },
  });
})();
</script>

<script type="text/html" data-template-name="llm-config">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Nom</label>
    <input type="text" id="node-config-input-name" placeholder="Mon LLM" />
  </div>
  <div class="form-row">
    <label for="node-config-input-llmType"><i class="fa fa-brain"></i> Backend</label>
    <select id="node-config-input-llmType" style="width:75%;">
      <optgroup label="Local">
        <option value="ollama">Ollama (Gemma, Mistral, LLaMA…)</option>
        <option value="lmstudio">LM Studio</option>
        <option value="localai">LocalAI</option>
        <option value="jan">Jan</option>
      </optgroup>
      <optgroup label="Cloud">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="mistral">Mistral AI</option>
      </optgroup>
      <optgroup label="Autre">
        <option value="rest">API REST custom</option>
      </optgroup>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-baseUrl"><i class="fa fa-globe"></i> URL</label>
    <input type="text" id="node-config-input-baseUrl" />
  </div>
  <div class="form-row">
    <label for="node-config-input-model"><i class="fa fa-cube"></i> Modèle</label>
    <input type="text" id="node-config-input-model" />
  </div>
  <div class="form-row rc-row-key" style="display:none;">
    <label for="node-config-input-apiKey"><i class="fa fa-key"></i> Clé API</label>
    <input type="password" id="node-config-input-apiKey" placeholder="sk-…" />
  </div>
  <div class="form-row">
    <label for="node-config-input-timeout"><i class="fa fa-clock-o"></i> Timeout (ms)</label>
    <input type="number" id="node-config-input-timeout" min="1000" step="1000" style="width:120px;" />
  </div>
  <div class="rc-row-rest" style="display:none;">
    <hr/>
    <div class="form-row">
      <label for="node-config-input-restPath"><i class="fa fa-road"></i> Chemin POST</label>
      <input type="text" id="node-config-input-restPath" placeholder="/v1/chat" />
    </div>
    <div class="form-row">
      <label for="node-config-input-restResultPath"><i class="fa fa-dot-circle-o"></i> Chemin résultat</label>
      <input type="text" id="node-config-input-restResultPath" placeholder="choices.0.message.content" />
    </div>
    <div class="form-row">
      <label for="node-config-input-restBodyTpl"><i class="fa fa-code"></i> Body template</label>
      <textarea id="node-config-input-restBodyTpl" rows="3"
        style="width:100%;font-family:monospace;font-size:11px;border-radius:4px;border:1px solid #ccc;padding:5px;"
        placeholder='{"model":"{{model}}","system":"{{system}}","prompt":"{{user"}}'></textarea>
      <div style="font-size:0.78em;color:#888;">Variables : <code>{{model}}</code> <code>{{system}}</code> <code>{{user}}</code></div>
    </div>
  </div>
  <div class="rc-hint-ollama" style="display:none;font-size:0.78em;color:#666;background:#f0f4ff;padding:7px;border-radius:4px;margin-top:6px;">
    <i class="fa fa-info-circle"></i> <a href="https://ollama.com" target="_blank">ollama.com</a> · <code>ollama pull gemma3:4b</code>
  </div>
  <div class="rc-hint-openai" style="display:none;font-size:0.78em;color:#666;background:#f0f4ff;padding:7px;border-radius:4px;margin-top:6px;">
    <i class="fa fa-info-circle"></i> Compatible OpenAI-like : LM Studio, LocalAI, Jan, Mistral…
  </div>
  <div class="form-row" style="margin-top:10px;">
    <button id="rc-llm-test" class="red-ui-button">Tester la connexion</button>
  </div>
</script>
