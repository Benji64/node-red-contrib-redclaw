<script type="text/javascript">
RED.nodes.registerType("rc-tool-search", {
  category: "RedClaw Coding",
  color:    "#cba6f7",
  defaults: {
    name:    { value: "" },
    workDir: { value: "" },
    timeout: { value: 30000 },
  },
  inputs:  1,
  outputs: 1,
  icon:    "font-awesome/fa-search",
  outputLabels: ["→ MCP Router"],
  inputLabels:  "Depuis MCP Router",
  label: function () { return this.name || "Search"; },
});
</script>

<script type="text/html" data-template-name="rc-tool-search">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Nom</label>
    <input type="text" id="node-input-name" placeholder="Search" />
  </div>
  <div class="form-row">
    <label for="node-input-workDir"><i class="fa fa-folder"></i> Répertoire</label>
    <input type="text" id="node-input-workDir" placeholder="~/mon-projet (défaut: home)" />
  </div>
  <div class="form-row">
    <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Timeout (ms)</label>
    <input type="number" id="node-input-timeout" min="1000" step="1000" style="width:110px;" />
  </div>
  <div style="font-size:0.78em;color:#555;background:#f8f8f8;padding:8px;border-radius:5px;margin-top:6px;line-height:1.6;">
    <b>Recherche dans les fichiers par contenu ou par nom.</b><br/>
    <b>Câblage :</b> <code>[MCP Router] ──► [Search] ──► [MCP Router]</code>
  </div>
</script>

<script type="text/html" data-help-name="rc-tool-search">
  <p><b>RedClaw Coding — Search</b><br/>Recherche dans les fichiers par contenu ou par nom.</p>
  <h3>Paramètres (msg.payload)</h3>
  <dl class="message-properties">
    <dt>pattern <span class="property-type">string</span></dt><dd>Pattern à chercher</dd>
    <dt>path <span class="property-type">string</span></dt><dd>Dossier de recherche (optionnel)</dd>
    <dt>type <span class="property-type">string</span></dt><dd>content (défaut) ou filename</dd>
    <dt>file_pattern <span class="property-type">string</span></dt><dd>Filtre fichiers: *.js, *.py… (optionnel)</dd>
    <dt>max_results <span class="property-type">string</span></dt><dd>Nombre max de résultats (défaut: 50)</dd>
  </dl>
  <h3>Résultat (msg.payload en sortie)</h3>
  <p>Retourné vers le MCP Router via <code>redclaw_call_id</code>.</p>
</script>
